<!DOCTYPE html>
<html lang="id" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zynex Studio - Admin Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { inter: ['Inter', 'sans-serif'] },
          colors: {
            neon: { cyan: '#06b6d4', blue: '#3b82f6', violet: '#8b5cf6', purple: '#a855f7' },
            dark: { 900: '#0a0a1a', 800: '#0f0f2a', 700: '#161638', 600: '#1e1e4a' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="bg-dark-900 text-white font-inter min-h-screen flex flex-col">

  <!-- Admin Navbar -->
  <nav class="border-b border-white/5 py-4 px-6 lg:px-8 flex items-center justify-between relative z-10">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-violet-500 flex items-center justify-center">
        <span class="text-white font-bold text-sm">Z</span>
      </div>
      <span class="text-lg font-bold dark-text">Zynex <span class="gradient-text">Admin</span></span>
    </a>
    <a href="index.html" class="text-sm text-neutral-400 hover:text-cyan-400 transition-colors flex items-center gap-1">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      Back to Site
    </a>
  </nav>

  <!-- Main Content (Hidden until authenticated) -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-6 lg:px-8 py-12 relative z-10" id="adminContent" style="display: none;">
    <div class="flex items-center justify-between mb-8">
      <h1 class="text-3xl font-bold dark-text">Inbox Messages</h1>
      <button onclick="clearAllMessages()" class="text-sm text-neutral-400 hover:text-red-400 transition-colors flex items-center gap-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        Clear All
      </button>
    </div>
    
    <div id="messageList" class="space-y-4">
      <!-- Messages will be injected here -->
    </div>
    
    <div id="emptyState" class="hidden text-center py-20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-neutral-600 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>
      <h3 class="text-xl font-semibold text-neutral-400 dark-text">No messages yet</h3>
      <p class="text-neutral-500 dark-subtext mt-2">When visitors submit the contact form, their messages will appear here.</p>
    </div>
  </main>

  <!-- Access Denied Screen -->
  <main class="flex-1 flex items-center justify-center relative z-10" id="deniedContent" style="display: none;">
    <div class="text-center">
      <div class="w-20 h-20 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
      </div>
      <h1 class="text-2xl font-bold text-white mb-2">Access Denied</h1>
      <p class="text-neutral-400 mb-6">You do not have permission to view this page.</p>
      <a href="index.html" class="inline-flex items-center gap-2 btn-glow text-white font-semibold px-6 py-3 rounded-full text-sm">
        Back to Home
      </a>
    </div>
  </main>

  <script src="admin.js"></script>
</body>
</html>
