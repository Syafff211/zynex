<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="../zynex.jpg">
  <title>Dashboard — Zynex Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;overflow-x:hidden;background:#0a0a1a;color:#e2e8f0;min-height:100vh}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0a1a}::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,#06b6d4,#8b5cf6);border-radius:3px}

    #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
    .grid-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(6,182,212,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black 20%,transparent 70%)}
    .blob{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:rgba(59,130,246,.12);top:-10%;left:-10%;animation:bm1 20s ease-in-out infinite}
    .blob-2{width:400px;height:400px;background:rgba(139,92,246,.1);bottom:-10%;right:-10%;animation:bm2 25s ease-in-out infinite}
    @keyframes bm1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
    @keyframes bm2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-50px)}}

    .gradient-text{background:linear-gradient(135deg,#06b6d4,#3b82f6,#8b5cf6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .glass{background:rgba(255,255,255,.03);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06)}

    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

    .dash-wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:40px 20px 80px}

    .dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;animation:fadeInUp .5s ease-out both;flex-wrap:wrap;gap:12px}
    .dash-header h1{font-size:24px;font-weight:800}
    .btn-logout{padding:10px 20px;border-radius:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px}
    .btn-logout:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);color:#fff}

    .welcome-card{border-radius:24px;padding:32px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);margin-bottom:24px;animation:fadeInUp .5s .1s ease-out both}
    .welcome-card h2{font-size:20px;font-weight:700;margin-bottom:4px}
    .welcome-card p{color:rgba(255,255,255,.4);font-size:14px}

    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
    @media(max-width:480px){.info-grid{grid-template-columns:1fr}}
    .info-card{border-radius:18px;padding:22px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);animation:fadeInUp .5s ease-out both}
    .info-card .label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.3);margin-bottom:8px}
    .info-card .value{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;word-break:break-all}
    .info-card .value i{font-size:14px;flex-shrink:0}

    .pkg-card-dash{border-radius:18px;padding:24px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);animation:fadeInUp .5s .4s ease-out both}
    .pkg-card-dash h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}

    .wa-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:14px;background:#25D366;color:#fff;font-size:14px;font-weight:600;text-decoration:none;transition:all .3s;margin-top:16px}
    .wa-btn:hover{background:#20bd5a;box-shadow:0 4px 20px rgba(37,211,102,.3);transform:translateY(-2px)}

    .back-link{text-align:center;margin-top:32px;animation:fadeInUp .5s .5s ease-out both}
    .back-link a{color:rgba(255,255,255,.3);font-size:13px;text-decoration:none;transition:color .3s;display:inline-flex;align-items:center;gap:6px}
    .back-link a:hover{color:#06b6d4}

    .toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
    .toast{padding:14px 20px;border-radius:14px;font-size:13px;font-weight:500;backdrop-filter:blur(20px);pointer-events:all;animation:slideInRight .4s ease-out both;display:flex;align-items:center;gap:10px;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .toast.info{background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.3);color:#67e8f9}
    .toast.out{animation:slideOutRight .3s ease-in both}
    @keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideOutRight{to{opacity:0;transform:translateX(40px)}}
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="grid-overlay"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="dash-wrap">
    <div class="dash-header">
      <h1><span class="gradient-text">Dashboard</span></h1>
      <button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="welcome-card">
      <h2>Halo, <span id="dashNama" class="gradient-text">-</span></h2>
      <p>Selamat datang di panel Zynex Studio. Berikut informasi akun Anda.</p>
    </div>

    <div class="info-grid">
      <div class="info-card" style="animation-delay:.15s">
        <div class="label">Username</div>
        <div class="value" style="color:#06b6d4"><i class="fa-solid fa-at"></i> <span id="dashUsername">-</span></div>
      </div>
      <div class="info-card" style="animation-delay:.2s">
        <div class="label">WhatsApp</div>
        <div class="value" style="color:#22c55e"><i class="fa-brands fa-whatsapp"></i> <span id="dashWA">-</span></div>
      </div>
      <div class="info-card" style="animation-delay:.25s">
        <div class="label">Email</div>
        <div class="value" style="color:#3b82f6"><i class="fa-solid fa-envelope"></i> <span id="dashEmail">-</span></div>
      </div>
      <div class="info-card" style="animation-delay:.3s">
        <div class="label">Terdaftar Sejak</div>
        <div class="value" style="color:#a855f7"><i class="fa-solid fa-calendar"></i> <span id="dashDate">-</span></div>
      </div>
    </div>

    <div class="pkg-card-dash" id="dashPkgCard">
      <h3><i class="fa-solid fa-tag"></i> Paket Aktif</h3>
      <div id="dashPkgContent"></div>
      <a id="dashWALink" href="#" target="_blank" class="wa-btn">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Hubungi via WhatsApp
      </a>
    </div>

    <div class="back-link"><a href="../"><i class="fa-solid fa-arrow-left"></i> Kembali ke Beranda</a></div>
  </div>

  <script>
    /* Particles */
    (function(){const c=document.getElementById('particles'),ctx=c.getContext('2d');let w,h,pts=[];function resize(){w=c.width=innerWidth;h=c.height=innerHeight}resize();window.addEventListener('resize',resize);for(let i=0;i<35;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+.4,dx:(Math.random()-.5)*.25,dy:(Math.random()-.5)*.25,o:Math.random()*.25+.08});function draw(){ctx.clearRect(0,0,w,h);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(6,182,212,${p.o})`;ctx.fill()});requestAnimationFrame(draw)}draw()})();

    function showToast(msg,type='info',dur=4000){const c=document.getElementById('toastContainer'),t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<i class="fa-solid fa-circle-info"></i><span>${msg}</span>`;c.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),300)},dur)}

    // Cek session & load data
    (async function(){
      let session;
      try{session=JSON.parse(localStorage.getItem('zynex_session'))}catch(e){}
      if(!session||!session.token||session.expires<Date.now()){window.location.href='login.html';return}

      try{
        const r=await fetch('/api/me',{headers:{'Authorization':'Bearer '+session.token}});
        const d=await r.json();
        if(!d.success){localStorage.removeItem('zynex_session');window.location.href='login.html';return}

        document.getElementById('dashNama').textContent=d.data.nama;
        document.getElementById('dashUsername').textContent=d.data.username;
        document.getElementById('dashWA').textContent=d.data.whatsapp;
        document.getElementById('dashEmail').textContent=d.data.email;

        const date=new Date(d.data.waktu);
        document.getElementById('dashDate').textContent=date.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

        const isPro=d.data.paket==='pro';
        const pkgCard=document.getElementById('dashPkgCard');
        const pkgContent=document.getElementById('dashPkgContent');
        const waLink=document.getElementById('dashWALink');

        if(isPro){
          pkgCard.style.borderColor='rgba(168,85,247,.2)';
          pkgContent.innerHTML=`
            <div style="font-size:32px;font-weight:800;color:#a855f7;margin-bottom:4px">Pro <span style="font-size:16px;font-weight:400;color:rgba(255,255,255,.3)">/project</span></div>
            <div style="font-size:20px;font-weight:800;margin-bottom:12px">20K</div>
            <div style="font-size:13px;color:rgba(255,255,255,.5);line-height:1.8">
              <div><i class="fa-solid fa-check" style="color:#a855f7;margin-right:6px"></i>Web Store</div>
              <div><i class="fa-solid fa-check" style="color:#a855f7;margin-right:6px"></i>Deploy ke Vercel</div>
              <div><i class="fa-solid fa-check" style="color:#a855f7;margin-right:6px"></i>Free deployment</div>
              <div><i class="fa-solid fa-check" style="color:#a855f7;margin-right:6px"></i>Fast delivery (1 hari)</div>
            </div>`;
          waLink.href='https://wa.me/6285141308100?text=Halo%20Zynex%20Studio,%20saya%20'+encodeURIComponent(d.data.username)+'%20dengan%20paket%20Pro.%20Mohon%20diproses.';
        }else{
          pkgCard.style.borderColor='rgba(6,182,212,.2)';
          pkgContent.innerHTML=`
            <div style="font-size:32px;font-weight:800;color:#06b6d4;margin-bottom:4px">Starter <span style="font-size:16px;font-weight:400;color:rgba(255,255,255,.3)">/project</span></div>
            <div style="font-size:20px;font-weight:800;margin-bottom:12px">15K</div>
            <div style="font-size:13px;color:rgba(255,255,255,.5);line-height:1.8">
              <div><i class="fa-solid fa-check" style="color:#06b6d4;margin-right:6px"></i>Web Store</div>
              <div><i class="fa-solid fa-check" style="color:#06b6d4;margin-right:6px"></i>Deploy ke Cloudflare</div>
              <div><i class="fa-solid fa-check" style="color:#06b6d4;margin-right:6px"></i>Full source code</div>
              <div><i class="fa-solid fa-check" style="color:#06b6d4;margin-right:6px"></i>Custom request</div>
            </div>`;
          waLink.href='https://wa.me/6285141308100?text=Halo%20Zynex%20Studio,%20saya%20'+encodeURIComponent(d.data.username)+'%20dengan%20paket%20Starter.%20Mohon%20diproses.';
        }
      }catch(e){
        console.error(e);
        // Fallback: tampilkan data dari session
        document.getElementById('dashNama').textContent=session.nama||'-';
        document.getElementById('dashUsername').textContent=session.username||'-';
      }
    })();

    function logout(){
      localStorage.removeItem('zynex_session');
      window.location.href='login.html';
    }
  </script>
</body>
</html>
